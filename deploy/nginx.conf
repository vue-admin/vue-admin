# Vue Admin 云主机 Nginx 配置参考（app + 文档同域）
# 部署到 /etc/nginx/conf.d/vue-admin.conf，按实际域名/路径调整后 nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;            # 改为你的域名或 IP

    root /var/www/vue-admin;                # app 构建产物（APP_PATH）
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # app 静态资源长缓存（带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存，保证发版即时生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA history 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 文档站点（/docs/ → 文档产物目录 DOCS_PATH）
    location /docs/ {
        alias /var/www/vue-admin-docs/;      # 文档构建产物（DOCS_PATH），末尾斜杠保留
        try_files $uri $uri/ /docs/index.html;
    }

    # 反向代理后端 API（同域避免跨域，按需开启）
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}
