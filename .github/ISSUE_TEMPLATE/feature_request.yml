name: ✨ 特性请求
description: 提出一个新功能建议
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请先搜索 [已有 Issue](https://github.com/rushui/vue-admin/issues?q=is%3Aissue) 避免重复。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 描述当前遇到的不便或缺失能力
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 描述你希望看到的能力或行为
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他方案
  - type: checkboxes
    id: pr-offer
    attributes:
      label: 我愿意提交 PR
      options:
        - label: 我愿意为该特性提交 PR
          required: false
