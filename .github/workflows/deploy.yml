name: Deploy to Server

# 推送 main 时自动构建 app + 文档站点，rsync 同步到云主机。
# 需在仓库 Settings → Secrets and variables → Actions 配置：
#   SERVER_HOST   云主机 IP 或域名（如 1.2.3.4 或 example.com）
#   SERVER_USER   SSH 登录用户（如 deploy）
#   SERVER_SSH_KEY  SSH 私钥（完整内容，cat ~/.ssh/id_xxx）
#   APP_PATH      app 部署目录（如 /var/www/vue-admin）
#   DOCS_PATH     文档部署目录（如 /var/www/vue-admin-docs）
on:
  push:
    branches: [main]
  workflow_dispatch: {} # 支持手动触发

# 同一时只跑一个部署，避免并发覆盖
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: |
          pnpm type-check
          pnpm lint
          pnpm test

      - name: Build app
        run: pnpm build
        env:
          # 部署到域名根路径；子路径改为 /admin/ 等
          VITE_BASE: ${{ vars.APP_BASE || '/' }}

      - name: Build docs
        run: pnpm docs:build
        env:
          # 文档部署到独立域名根路径（vue-admin.cncf.vip/）；GitHub Pages 用 /vue-admin/
          DOCS_BASE: ${{ vars.DOCS_BASE || '/' }}

      - name: Setup SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          # 写入私钥（注意末尾换行，否则某些 OpenSSH 版本拒绝读取）
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # 诊断：确认 host 可达 + 端口开放（keyscan 失败常因端口被挡或 host 解析失败）
          echo "Probing $SERVER_HOST:$SSH_PORT ..."
          if ! ssh-keyscan -T 15 -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::ssh-keyscan failed for $SERVER_HOST:$SSH_PORT — 检查 SERVER_HOST 是否正确、SSH_PORT 是否开放、安全组是否放行"
            exit 1
          fi
          echo "✓ host key recorded"

      - name: Deploy app
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # --exclude 走 switches（该 action 无 excludes 输入）；--delete 排除 .user.ini 后再删
          switches: -avz --delete --exclude=.user.ini
          path: dist/
          remote_path: ${{ secrets.APP_PATH }}/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_port: ${{ secrets.SSH_PORT || '22' }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy docs
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude=.user.ini
          path: docs-site/.vitepress/dist/
          remote_path: ${{ secrets.DOCS_PATH }}/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_port: ${{ secrets.SSH_PORT || '22' }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- App:  https://${{ secrets.SERVER_HOST }}/" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: https://${{ secrets.SERVER_HOST }}/" >> $GITHUB_STEP_SUMMARY
